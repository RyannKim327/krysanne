<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TeleAI (Krysanne) - An empathetic, always-on AI companion hosted on Telegram designed to listen, comfort, and support you.">
    <title>TeleAI — Compassionate AI Telegram Companion</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom StyleSheet -->
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="container navbar">
            <a href="/" class="logo" id="logo-main">
                <i class="fa-solid fa-robot"></i> TeleAI
            </a>
            <nav aria-label="Main Navigation">
                <ul class="nav-links">
                    <li><a href="/" class="nav-link" id="nav-home"><i class="fa-solid fa-house"></i> Home</a></li>
                    <li><a href="/readme" class="nav-link" id="nav-readme"><i class="fa-solid fa-book-open"></i> Readme</a></li>
                    <li><a href="/privacy" class="nav-link" id="nav-privacy"><i class="fa-solid fa-shield-halved"></i> Privacy</a></li>
                    <li><a href="/contributors" class="nav-link" id="nav-contributors"><i class="fa-solid fa-users"></i> Contributors</a></li>
                    <li><a href="/license" class="nav-link" id="nav-license"><i class="fa-solid fa-gavel"></i> License</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        {{CONTENT}}
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-text" id="footer-text-copyright">
                &copy; 2026 Master Piece of Paper. Released under the Educational Community License 2.0 (ECL-2.0).
            </div>
            <ul class="footer-links" id="footer-links-list">
                <li><a href="/readme">Readme</a></li>
                <li><a href="/privacy">Privacy Policy</a></li>
                <li><a href="/contributors">Contributors</a></li>
                <li><a href="/license">License</a></li>
            </ul>
        </div>
    </footer>

    <script>
        // Client-side script to handle active navigation state dynamically
        document.addEventListener("DOMContentLoaded", () => {
            const pathname = window.location.pathname;
             let currentId = "nav-home";
            if (pathname === "/privacy") currentId = "nav-privacy";
            else if (pathname === "/readme") currentId = "nav-readme";
            else if (pathname === "/contributors") currentId = "nav-contributors";
            else if (pathname === "/license") currentId = "nav-license";
            
            const activeLink = document.getElementById(currentId);
            if (activeLink) {
                activeLink.classList.add("active");
            }
        });
    </script>
</body>
</html>
